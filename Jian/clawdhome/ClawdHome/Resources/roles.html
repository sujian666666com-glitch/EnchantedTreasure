<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>Role Center</title>
  <style>
    /* ── 颜色令牌：浅色模式 ── */
    :root {
      --bg-primary:    #F5F5F7;
      --bg-elevated:   #FFFFFF;
      --bg-secondary:  #EEEEEF;
      --label:         #1D1D1F;
      --label-2:       #3C3C43;
      --label-3:       #6C6C70;
      --label-4:       #AEAEB2;
      --separator:     rgba(0,0,0,0.10);
      --search-bg:     rgba(120,120,128,0.12);
      --tag-bg:        rgba(120,120,128,0.12);
      --tag-active-bg: #007AFF;
      --card-shadow:   0 1px 4px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.06);
      --accent:        #007AFF;
      --accent-soft:   rgba(0,122,255,0.10);
    }

    /* ── 颜色令牌：深色模式 ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary:    #1C1C1E;
        --bg-elevated:   #2C2C2E;
        --bg-secondary:  #3A3A3C;
        --label:         #F5F5F7;
        --label-2:       #EBEBF5CC;
        --label-3:       #EBEBF599;
        --label-4:       #EBEBF54D;
        --separator:     rgba(255,255,255,0.10);
        --search-bg:     rgba(120,120,128,0.20);
        --tag-bg:        rgba(120,120,128,0.20);
        --tag-active-bg: #0A84FF;
        --card-shadow:   0 1px 4px rgba(0,0,0,0.40), 0 0 0 0.5px rgba(255,255,255,0.06);
        --accent:        #0A84FF;
        --accent-soft:   rgba(10,132,255,0.15);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg-primary);
      color: var(--label);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 工具栏（搜索 + 标签，无重复大标题） ── */
    .toolbar {
      padding: 12px 16px 8px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-primary);
      border-bottom: 0.5px solid var(--separator);
    }

    .search-bar {
      background: var(--search-bg);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      width: 100%;
      border: none;
      outline: none;
      color: var(--label);
      margin-bottom: 8px;
    }
    .search-bar::placeholder { color: var(--label-4); }

    .tags {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .tags::-webkit-scrollbar { display: none; }

    .tag {
      background: var(--tag-bg);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--label-2);
      white-space: nowrap;
      cursor: pointer;
      border: none;
      transition: background 0.12s, color 0.12s;
    }
    .tag.active {
      background: var(--tag-active-bg);
      color: white;
    }

    /* ── 卡片网格 ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      padding: 12px 16px 24px;
    }

    /* ── 角色卡片 ── */
    .card {
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 14px;
      box-shadow: var(--card-shadow);
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: default;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }
    .card-emoji {
      font-size: 24px;
      line-height: 1;
      flex-shrink: 0;
    }
    .card-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.1px;
      line-height: 1.3;
    }

    .card-soul {
      font-size: 11px;
      color: var(--label-3);
      line-height: 1.5;
      flex: 1;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }
    .card-tag {
      background: var(--bg-secondary);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      color: var(--label-4);
      font-weight: 500;
    }

    .adopt-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 7px;
      padding: 7px 0;
      font-size: 12px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.1s;
    }
    .adopt-btn:hover  { opacity: 0.88; }
    .adopt-btn:active { opacity: 0.70; }

    /* 空结果 */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--label-4);
      font-size: 13px;
      padding: 40px 0;
    }
  </style>
</head>

        interview_001: { name: 'Interview Coach', soul: 'Push past your comfort zone so your best self shows up.', skills: ['Resume review', 'Mock interviews', 'STAR method'] },
        travel_001: { name: 'Travel Planner', soul: 'You enjoy the world while I handle the messy planning.', skills: ['Itineraries', 'Flights and hotels', 'Hidden gems'] },
        emo_001: { name: 'Emotional Support Companion', soul: 'Put down the armor. This is a safe place to be human.', skills: ['Active listening', 'Acceptance', 'Anxiety relief'] },
        scholar_001: { name: 'Research Assistant', soul: 'Distill signal from piles of papers without compromising rigor.', skills: ['Summaries', 'Literature mapping', 'Cross-checking'] },
        arch_001: { name: 'Full-Stack Architect', soul: 'Stay above the code and shape the system that survives scale.', skills: ['Architecture', 'Decoupling', 'Scalability'] }
      }
    };

    let currentTag = 'all';
    let currentSearch = '';
    let currentLocale = normalizeLocale(window.__clawdhomeLocale || navigator.language || 'en');

    function normalizeLocale(locale) {
      const value = String(locale || '').toLowerCase();
      return value.startsWith('zh') ? 'zh-CN' : 'en';
    }

    function ui() {
      return UI_TEXT[currentLocale] || UI_TEXT.en;
    }

    function localizedRole(role) {
      const translation = ROLE_TRANSLATIONS[currentLocale]?.[role.id];
      if (!translation) return role;
      return {
        ...role,
        name: translation.name,
        soul: translation.soul,
        skills: translation.skills || role.skills
      };
    }

    function buildLocalizedTemplates(role) {
      if (currentLocale !== 'en') {
        return {
          fileSoul: role.fileSoul || '',
          fileIdentity: role.fileIdentity || '',
          fileUser: role.fileUser || ''
        };
      }

      const localized = localizedRole(role);
      const skills = localized.skills.join(', ');
      return {
        fileSoul: `Core belief: ${localized.soul}\n\nMission:\n- Help the user make steady progress on meaningful work.\n- Apply ${skills} where it matters most.\n- Stay honest, useful, and action-oriented.`,
        fileIdentity: `Role: ${localized.name}\nTone: Clear, practical, and thoughtful\nStrengths: ${skills}\n\nWorking style:\n- Start with the conclusion\n- Stay grounded in real constraints\n- Turn ideas into concrete next steps`,
        fileUser: `# About You\n\nYour role or context:\nWhat you care about most right now:\nYour preferred working style:\nAny constraints I should keep in mind:`
      };
    }

    function refreshChrome() {
      const text = ui();
      document.documentElement.lang = currentLocale;
      document.title = text.title;

      const searchBar = document.getElementById('searchBar');
      if (searchBar) searchBar.placeholder = text.searchPlaceholder;

      document.querySelectorAll('.tag').forEach(tag => {
        const key = tag.dataset.tag;
        tag.textContent = text.tags[key] || key;
      });
    }

    function setAppLocale(locale) {
      currentLocale = normalizeLocale(locale);
      refreshChrome();
      render();
    }

    function render() {
      const grid = document.getElementById('roleGrid');
      const filtered = roles.filter(r => {
        const matchTag = currentTag === 'all' || r.category === currentTag;
        const q = currentSearch.toLowerCase();
        const localized = localizedRole(r);
        const haystack = [localized.name, localized.soul, localized.skills.join(' ')].join(' ').toLowerCase();
        const matchSearch = !q || haystack.includes(q);
        return matchTag && matchSearch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<p class="empty">${ui().empty}</p>`;
        return;
      }

      grid.innerHTML = filtered.map(r => {
        const localized = localizedRole(r);
        return `
        <div class="card">
          <div class="card-header">
            <span class="card-emoji">${localized.emoji}</span>
            <span class="card-name">${localized.name}</span>
          </div>
          <div class="card-soul">${localized.soul}</div>
          <div class="card-tags">
            ${localized.skills.map(s => `<span class="card-tag">#${s}</span>`).join('')}
          </div>
          <button class="adopt-btn" onclick="adoptAgent('${r.id}')">${ui().adopt}</button>
        </div>
      `;
      }).join('');
    }

    function setTag(el, tag) {
      document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentTag = tag;
      render();
    }

    function filterCards(val) {
      currentSearch = val;
      render();
    }

    function adoptAgent(roleId) {
      const role = roles.find(r => r.id === roleId);
      if (!role) return;
      const localized = localizedRole(role);
      const templates = buildLocalizedTemplates(role);

      const dna = {
        id: role.id,
        name: localized.name,
        emoji: role.emoji,
        soul: localized.soul,
        skills: localized.skills,
        category: currentLocale === 'en' ? (ui().tags[role.category] || role.category) : role.category,
        version: "1.0",
        timestamp: new Date().toISOString(),
        suggestedUsername: role.suggestedUsername || "",
        fileSoul: templates.fileSoul,
        fileIdentity: templates.fileIdentity,
        fileUser: templates.fileUser
      };

      if (window.webkit?.messageHandlers?.ClawdHomeBridge) {
        window.webkit.messageHandlers.ClawdHomeBridge.postMessage(dna);
      } else {
        console.log('[Bridge] adoptAgent:', JSON.stringify(dna, null, 2));
        alert('Bridge not available\n\n' + JSON.stringify(dna, null, 2));
      }
    }

    refreshChrome();
    setAppLocale(currentLocale);
  </script>
</body>
</html>
